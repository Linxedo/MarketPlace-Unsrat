<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marketplace Unsrat</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== LOGIN SECTION ===== -->
    <section class="py-5 bg-light min-vh-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <!-- Login Card -->
                    <div class="card border-0 shadow-sm login-card">
                        <div class="card-body p-4">
                            <!-- Icon -->
                            <div class="text-center mb-4">
                                <h3 class="fw-bold text-dark">Marketplace Unsrat</h3>
                                <p class="text-muted small">Silakan login dengan akun Anda</p>
                            </div>

                            <!-- Login Form -->
                            <form id="loginForm" method="POST" action="#">
                                <!-- Username Input -->
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-500 text-dark">Username</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0">
                                            <i class="bi bi-person text-primary"></i>
                                        </span>
                                        <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" 
                                               placeholder="Masukkan username Anda" required>
                                    </div>
                                </div>

                                <!-- Password Input -->
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-500 text-dark">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0">
                                            <i class="bi bi-lock text-primary"></i>
                                        </span>
                                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" 
                                               placeholder="Masukkan password" required>
                                        <button type="button" class="btn btn-outline-secondary border-start-0" id="togglePassword">
                                            <i class="bi bi-eye text-primary"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Remember Me & Forgot Password -->
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                                        <label class="form-check-label text-muted small" for="rememberMe">
                                            Ingat saya
                                        </label>
                                    </div>
                                    <a href="#" class="text-primary text-decoration-none small fw-500">Lupa password?</a>
                                </div>

                                <!-- Login Button -->
                                <button type="submit" class="btn btn-login w-100 fw-600 py-2 mb-3">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
                                </button>

                            <!-- Sign Up Link -->
                            <div class="text-center mt-4 pt-3 border-top">
                                <p class="text-muted small mb-0">
                                    Belum punya akun? 
                                    <a href="#" class="text-primary text-decoration-none fw-600">Daftar sekarang</a>
                                </p>
                            </div>
                        </div>
                    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' 
                    ? '<i class="bi bi-eye text-primary"></i>' 
                    : '<i class="bi bi-eye-slash text-primary"></i>';
            });
        }

        // Form Submit Handler
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                // Add your login logic here
                alert('Form submitted! (Demo Only)');
            });
        }
    </script>
</body>
</html>
